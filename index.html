<!DOCTYPE html>
<html lang="nl-BE">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prijscalculator maatkast</title>
  <style>
    :root {
      --accent: #8b5a2b;
      --accent-dark: #68411f;
      --bg: #f7f4ef;
      --card: #ffffff;
      --text: #262626;
      --muted: #666666;
      --border: #ded6cc;
      --error-bg: #fff1f1;
      --error-text: #9f1d1d;
      --success-bg: #f3eee7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .calculator {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      color: var(--accent-dark);
      font-size: clamp(1.6rem, 5vw, 2.1rem);
      line-height: 1.2;
    }

    .intro {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 1rem;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .field {
      margin-bottom: 18px;
    }

    input,
    select {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      background: #fff;
      color: var(--text);
    }

    input:focus,
    select:focus {
      outline: 3px solid rgba(139, 90, 43, 0.22);
      border-color: var(--accent);
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
    }

    button {
      min-height: 48px;
      border: 0;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .primary:hover {
      background: var(--accent-dark);
    }

    .secondary {
      background: #efe7dd;
      color: var(--accent-dark);
    }

    .secondary:hover {
      background: #e3d6c8;
    }

    .message {
      display: none;
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      font-size: 1rem;
    }

    .message.error {
      display: block;
      background: var(--error-bg);
      color: var(--error-text);
      border: 1px solid #f1c7c7;
    }

    .message.result {
      display: block;
      background: var(--success-bg);
      border: 1px solid var(--border);
    }

    .price {
      display: block;
      margin: 6px 0;
      color: var(--accent-dark);
      font-size: clamp(1.7rem, 7vw, 2.3rem);
      font-weight: 800;
    }

    .disclaimer {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 420px) {
      main {
        padding: 16px;
        align-items: flex-start;
      }

      .calculator {
        padding: 22px;
        border-radius: 14px;
      }

      .buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="calculator" aria-labelledby="title">
      <h1 id="title">Prijscalculator maatkast</h1>
      <p class="intro">
        Bereken snel een indicatieve richtprijs voor een maatkast op basis van afmetingen en afwerking.
      </p>

      <form id="priceForm" novalidate>
        <div class="field">
          <label for="width">Breedte in cm</label>
          <input id="width" name="width" type="number" inputmode="decimal" min="0.01" step="0.01" placeholder="Bijvoorbeeld 240" />
        </div>

        <div class="field">
          <label for="height">Hoogte in cm</label>
          <input id="height" name="height" type="number" inputmode="decimal" min="0.01" step="0.01" placeholder="Bijvoorbeeld 260" />
        </div>

        <div class="field">
          <label for="finish">Type afwerking</label>
          <select id="finish" name="finish">
            <option value="">Kies een afwerking</option>
            <option value="standard">Standaard</option>
            <option value="premium">Premium +20%</option>
            <option value="luxury">Luxe +40%</option>
          </select>
        </div>

        <div class="buttons">
          <button class="primary" type="submit">Bereken</button>
          <button class="secondary" type="button" id="clearButton">Velden leegmaken</button>
        </div>
      </form>

      <div id="message" class="message" role="status" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const form = document.getElementById("priceForm");
    const widthInput = document.getElementById("width");
    const heightInput = document.getElementById("height");
    const finishSelect = document.getElementById("finish");
    const message = document.getElementById("message");
    const clearButton = document.getElementById("clearButton");

    const BASE_PRICE_PER_M2 = 250;

    const finishMultipliers = {
      standard: 1,
      premium: 1.2,
      luxury: 1.4
    };

    function showError(text) {
      message.className = "message error";
      message.textContent = text;
    }

    function showResult(price, area) {
      const formattedPrice = new Intl.NumberFormat("nl-BE", {
        style: "currency",
        currency: "EUR",
        maximumFractionDigits: 0
      }).format(price);

      const formattedArea = new Intl.NumberFormat("nl-BE", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }).format(area);

      message.className = "message result";
      message.innerHTML = `
        Geschatte oppervlakte: <strong>${formattedArea} m²</strong>
        <span class="price">${formattedPrice}</span>
        <div class="disclaimer">
          Deze prijs is een richtprijs en geen bindende offerte. Voor een exacte prijs is een opmeting en bespreking nodig.
        </div>
      `;
    }

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const widthCm = Number(widthInput.value);
      const heightCm = Number(heightInput.value);
      const finish = finishSelect.value;

      if (!widthInput.value || !heightInput.value || !finish) {
        showError("Vul de breedte, hoogte en afwerking in om een richtprijs te berekenen.");
        return;
      }

      if (widthCm <= 0 || heightCm <= 0 || Number.isNaN(widthCm) || Number.isNaN(heightCm)) {
        showError("Gebruik alleen positieve getallen voor breedte en hoogte.");
        return;
      }

      const areaM2 = (widthCm / 100) * (heightCm / 100);
      const price = areaM2 * BASE_PRICE_PER_M2 * finishMultipliers[finish];

      showResult(price, areaM2);
    });

    clearButton.addEventListener("click", function () {
      form.reset();
      message.className = "message";
      message.textContent = "";
    });
  </script>
</body>
</html>
