<!DOCTYPE html>
<html lang="nl-BE">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schrijnwerkerij CVO Creo</title>

  <style>
    :root {
      --blue: #243b7f;
      --blue-dark: #18295c;
      --yellow: #f2c62f;
      --grey-bg: #f3f4f6;
      --grey-border: #d7dbe3;
      --grey-text: #5f6673;
      --white: #ffffff;
      --text: #1f2933;
      --error-bg: #fff1f1;
      --error-text: #9f1d1d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #eef1f6 0%, #ffffff 100%);
      color: var(--text);
      line-height: 1.5;
    }

    main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 18px;
    }

    .calculator {
      width: 100%;
      max-width: 620px;
      background: var(--white);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 18px 45px rgba(24, 41, 92, 0.18);
      border: 1px solid var(--grey-border);
    }

    .header {
      background: var(--blue);
      color: var(--white);
      padding: 30px 32px;
      position: relative;
    }

    .header::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 8px;
      background: var(--yellow);
    }

    .label {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      line-height: 1.15;
    }

    .intro {
      margin: 0;
      color: #e5e9f2;
      font-size: 1.05rem;
      max-width: 520px;
    }

    form {
      padding: 32px;
      background: var(--white);
    }

    .field {
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--blue-dark);
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      min-height: 50px;
      padding: 13px 14px;
      border: 1px solid var(--grey-border);
      border-radius: 12px;
      font-size: 1rem;
      background: #ffffff;
      color: var(--text);
    }

    input:focus,
    select:focus {
      outline: 3px solid rgba(242, 198, 47, 0.35);
      border-color: var(--blue);
    }

    .buttons {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 14px;
      margin-top: 8px;
    }

    button {
      min-height: 54px;
      border: 0;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
    }

    .primary {
      background: var(--blue);
      color: var(--white);
    }

    .primary:hover {
      background: var(--blue-dark);
    }

    .secondary {
      background: var(--grey-bg);
      color: var(--blue);
      border: 1px solid var(--grey-border);
    }

    .secondary:hover {
      background: #e7eaf0;
    }

    .message {
      display: none;
      margin: 0 32px 32px;
      padding: 20px;
      border-radius: 16px;
      font-size: 1rem;
    }

    .message.error {
      display: block;
      background: var(--error-bg);
      color: var(--error-text);
      border: 1px solid #f1c7c7;
    }

    .message.result {
      display: block;
      background: #f7f8fb;
      border: 1px solid var(--grey-border);
      border-left: 8px solid var(--yellow);
    }

    .price {
      display: block;
      margin: 8px 0;
      color: var(--blue);
      font-size: clamp(2rem, 7vw, 2.8rem);
      font-weight: 900;
      line-height: 1.1;
    }

    .disclaimer {
      margin-top: 10px;
      color: var(--grey-text);
      font-size: 0.95rem;
    }

    @media (max-width: 520px) {
      main {
        align-items: flex-start;
        padding: 16px;
      }

      .header,
      form {
        padding: 24px;
      }

      .message {
        margin: 0 24px 24px;
      }

      .buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main>
    <section class="calculator" aria-labelledby="title">
      <div class="header">
        <span class="label">Offertecalculator</span>
        <h1 id="title">Schrijnwerkerij CVO Creo</h1>
        <p class="intro">
          Bereken snel een indicatieve richtprijs voor een maatkast op basis van afmetingen en afwerking.
        </p>
      </div>

      <form id="priceForm" novalidate>
        <div class="field">
          <label for="width">Breedte in cm</label>
          <input id="width" name="width" type="number" inputmode="decimal" min="0.01" step="0.01" placeholder="Bijvoorbeeld 240" />
        </div>

        <div class="field">
          <label for="height">Hoogte in cm</label>
          <input id="height" name="height" type="number" inputmode="decimal" min="0.01" step="0.01" placeholder="Bijvoorbeeld 260" />
        </div>

        <div class="field">
          <label for="finish">Type afwerking</label>
          <select id="finish" name="finish">
            <option value="">Kies een afwerking</option>
            <option value="standard">Standaard</option>
            <option value="premium">Premium +20%</option>
            <option value="luxury">Luxe +40%</option>
          </select>
        </div>

        <div class="buttons">
          <button class="primary" type="submit">Bereken richtprijs</button>
          <button class="secondary" type="button" id="clearButton">Velden leegmaken</button>
        </div>
      </form>

      <div id="message" class="message" role="status" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const form = document.getElementById("priceForm");
    const widthInput = document.getElementById("width");
    const heightInput = document.getElementById("height");
    const finishSelect = document.getElementById("finish");
    const message = document.getElementById("message");
    const clearButton = document.getElementById("clearButton");

    const BASE_PRICE_PER_M2 = 250;

    const finishMultipliers = {
      standard: 1,
      premium: 1.2,
      luxury: 1.4
    };

    function showError(text) {
      message.className = "message error";
      message.textContent = text;
    }

    function showResult(price, area) {
      const formattedPrice = new Intl.NumberFormat("nl-BE", {
        style: "currency",
        currency: "EUR",
        maximumFractionDigits: 0
      }).format(price);

      const formattedArea = new Intl.NumberFormat("nl-BE", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }).format(area);

      message.className = "message result";
      message.innerHTML = `
        Geschatte oppervlakte: <strong>${formattedArea} m²</strong>
        <span class="price">${formattedPrice}</span>
        <div class="disclaimer">
          Deze prijs is een richtprijs en geen bindende offerte. Voor een exacte prijs is een opmeting en bespreking nodig.
        </div>
      `;
    }

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const widthCm = Number(widthInput.value);
      const heightCm = Number(heightInput.value);
      const finish = finishSelect.value;

      if (!widthInput.value || !heightInput.value || !finish) {
        showError("Vul de breedte, hoogte en afwerking in om een richtprijs te berekenen.");
        return;
      }

      if (widthCm <= 0 || heightCm <= 0 || Number.isNaN(widthCm) || Number.isNaN(heightCm)) {
        showError("Gebruik alleen positieve getallen voor breedte en hoogte.");
        return;
      }

      const areaM2 = (widthCm / 100) * (heightCm / 100);
      const price = areaM2 * BASE_PRICE_PER_M2 * finishMultipliers[finish];

      showResult(price, areaM2);
    });

    clearButton.addEventListener("click", function () {
      form.reset();
      message.className = "message";
      message.textContent = "";
    });
  </script>
</body>
</html>
